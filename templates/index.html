<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pandoc Web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<style>
:root {
  --bg:#0c0c0c;--bg-deep:#080808;--surface:#161616;--surface2:#1c1c1c;
  --border:#2a2a2a;--accent:#e8b931;--accent-dim:#c49b1a;
  --text:#e8e4dc;--text-muted:#6b6560;--error:#d44;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-mono:'DM Mono','Courier New',monospace;
  --sidebar-w:200px;--toolbar-h:42px;--statusbar-h:26px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-weight:300;font-size:13px;overflow:hidden;height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E")}

/* ── 以下布局 CSS 与 V0 完全一致 ── */

.workspace{flex:1;display:flex;min-height:0}

.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:center}
.sidebar-head span{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted)}
.sidebar-head button{background:var(--accent);border:none;color:var(--bg);width:22px;height:22px;font-size:14px;font-weight:400;cursor:pointer;line-height:1;transition:background .2s}
.sidebar-head button:hover{background:var(--accent-dim)}
.file-list{flex:1;overflow-y:auto;padding:0 6px 10px}
.file-item{display:flex;align-items:center;padding:7px 8px;cursor:pointer;border:1px solid transparent;transition:all .2s;margin-bottom:2px}
.file-item:hover{background:var(--surface2);border-color:var(--border)}
.file-item.active{background:var(--surface2);border-color:var(--accent);border-left:2px solid var(--accent)}
.file-item .fname{flex:1;font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .fdel{background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;padding:0 2px;opacity:0;transition:opacity .2s}
.file-item:hover .fdel{opacity:1}
.file-item .fdel:hover{color:var(--error)}

.content{flex:1;display:flex;flex-direction:column;min-width:0}

.toolbar{height:var(--toolbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0}
.tb{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:var(--font-mono);font-size:.72rem;letter-spacing:.08em;padding:6px 14px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.tb:hover{border-color:var(--accent);color:var(--text)}
.tb.primary{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.tb.primary:hover{background:var(--accent-dim)}
.tb:disabled{opacity:.3;cursor:not-allowed}
.toolbar .sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}
.export-wrap{display:flex;align-items:center;flex-shrink:0}
.export-wrap select{background:var(--surface2);border:1px solid var(--border);border-right:none;color:var(--text);font-family:var(--font-mono);font-size:.72rem;padding:6px 8px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none}
.export-wrap select:focus{border-color:var(--accent)}
.export-wrap .tb{border-left:1px solid var(--border)}
.current-name{flex:1;text-align:right;font-size:.75rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px}

.split{flex:1;display:flex;min-height:0}
.editor-pane{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.preview-pane{flex:1;border-left:1px solid var(--border);background:var(--bg-deep);position:relative;min-width:0;overflow-y:auto}
.preview-pane .preview-content{padding:28px 32px;font-family:'Noto Serif CJK SC','Noto Serif',Georgia,serif;font-size:14px;line-height:1.8;color:var(--text);max-width:700px}
.preview-pane .preview-content h1{font-family:var(--font-display);font-size:2rem;font-weight:300;color:var(--accent);margin:1.4em 0 .5em;letter-spacing:.03em}
.preview-pane .preview-content h2{font-size:1.4rem;font-weight:300;color:var(--accent);margin:1.2em 0 .4em;border-bottom:1px solid var(--border);padding-bottom:4px}
.preview-pane .preview-content h3{font-size:1.1rem;font-weight:400;margin:1em 0 .3em}
.preview-pane .preview-content p{margin:.6em 0}
.preview-pane .preview-content a{color:var(--accent)}
.preview-pane .preview-content code{font-family:var(--font-mono);font-size:.85em;background:var(--surface);padding:2px 6px;border:1px solid var(--border)}
.preview-pane .preview-content pre{background:var(--surface);border:1px solid var(--border);padding:14px 18px;overflow-x:auto;margin:1em 0}
.preview-pane .preview-content pre code{background:none;border:none;padding:0}
.preview-pane .preview-content blockquote{border-left:3px solid var(--accent);padding-left:16px;color:var(--text-muted);margin:1em 0}
.preview-pane .preview-content ul,.preview-pane .preview-content ol{padding-left:1.6em;margin:.5em 0}
.preview-pane .preview-content li{margin:.3em 0}
.preview-pane .preview-content img{max-width:100%}
.preview-pane .preview-content table{border-collapse:collapse;width:100%;margin:1em 0}
.preview-pane .preview-content th,.preview-pane .preview-content td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.preview-pane .preview-content th{background:var(--surface);font-weight:400}
.preview-pane .preview-content hr{border:none;border-top:1px solid var(--border);margin:2em 0}

.preview-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.8rem;letter-spacing:.1em}

.editor-pane .CodeMirror{height:100%;font-family:var(--font-mono);font-size:13px;line-height:1.65;background:#0e0e0e;color:var(--text)}
.CodeMirror-gutters{background:#121212;border-right:1px solid var(--border)}
.CodeMirror-linenumber{color:#3e3a36}
.CodeMirror-cursor{border-left:1px solid var(--accent)}
.CodeMirror-selected{background:#2a2520!important}
.CodeMirror-activeline-background{background:#1a1612}
.CodeMirror-matchingbracket{color:var(--accent)!important;font-weight:600}

.cm-s-typst-dark span.cm-comment{color:#555048;font-style:italic}
.cm-s-typst-dark span.cm-string{color:#8ab858}
.cm-s-typst-dark span.cm-string-2{color:#6a9}
.cm-s-typst-dark span.cm-keyword{color:#c77dba}
.cm-s-typst-dark span.cm-variable-2{color:var(--accent)}
.cm-s-typst-dark span.cm-header{color:var(--accent);font-weight:600}
.cm-s-typst-dark span.cm-number{color:#d19a66}
.cm-s-typst-dark span.cm-atom{color:#56b6c2}
.cm-s-typst-dark span.cm-tag{color:#e06c75}
.cm-s-typst-dark span.cm-link{color:#61afef}
.cm-s-typst-dark span.cm-operator{color:#abb2bf}
.cm-s-typst-dark span.cm-emphasis{font-style:italic}
.cm-s-typst-dark span.cm-strong{font-weight:700}

.error-panel{background:#1a0808;border-top:1px solid #400;max-height:140px;overflow-y:auto;padding:8px 14px;display:none}
.error-panel pre{font-family:var(--font-mono);font-size:.78rem;color:#f66;line-height:1.5;white-space:pre-wrap}

.status-bar{height:var(--statusbar-h);background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;padding:0 14px;font-size:.7rem;color:var(--text-muted);flex-shrink:0}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);padding:28px;width:340px;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent)}
.modal h3{font-family:var(--font-display);font-weight:300;font-size:1.3rem;color:var(--accent);margin-bottom:18px;letter-spacing:.04em}
.modal input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:.85rem;padding:10px 12px;outline:none;transition:border-color .2s}
.modal input[type=text]:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
</style>
</head>
<body>

<div class="workspace">
  <aside class="sidebar">
    <div class="sidebar-head">
      <span>Typst</span>
      <button id="btnNew" title="新建">+</button>
    </div>
    <div class="file-list" id="fileList"></div>
  </aside>

  <div class="content">
    <div class="toolbar">
      <button class="tb" id="btnSave" title="保存 (Ctrl+S)">保存</button>
      <button class="tb primary" id="btnPreview" title="预览 (Ctrl+Enter)">预览</button>
      <span class="sep"></span>
      <div class="export-wrap">
        <select id="exportFmt">
          <option value="pdf">PDF</option>
          <option value="epub">EPUB</option>
          <option value="html">HTML</option>
          <option value="docx">DOCX</option>
          <option value="md">Markdown</option>
          <option value="latex">LaTeX</option>
        </select>
        <button class="tb" id="btnExport" title="编译下载">下载</button>
      </div>
      <span class="current-name" id="currentName">未打开文件</span>
    </div>

    <div class="split">
      <div class="editor-pane">
        <textarea id="code"></textarea>
      </div>
      <div class="preview-pane">
        <div class="preview-placeholder" id="placeholder">按 Ctrl+S 保存并预览</div>
        <div class="preview-content" id="previewContent" style="display:none"></div>
      </div>
    </div>

    <div class="error-panel" id="errorPanel"><pre id="errorText"></pre></div>
  </div>
</div>

<div class="status-bar">
  <span id="statusLeft">就绪</span>
  <span id="statusRight"></span>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>新建文件</h3>
    <input type="text" id="newName" placeholder="文件名.typ" autofocus>
    <div class="modal-actions">
      <button class="tb" id="modalCancel">取消</button>
      <button class="tb primary" id="modalOk">创建</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>

<script>
CodeMirror.defineMode("typst",function(){
  return{
    startState:function(){return{inBlock:false}},
    token:function(stream,state){
      if(stream.match("/*")){state.inBlock=true;return"comment"}
      if(state.inBlock){if(stream.match("*/"))state.inBlock=false;else stream.next();return"comment"}
      if(stream.match("//")){stream.skipToEnd();return"comment"}
      if(stream.sol()&&stream.match(/^=+\s/)){stream.skipToEnd();return"header"}
      if(stream.match(/^```/)){stream.skipToEnd();return"string-2"}
      if(stream.peek()==='"'){stream.next();while(!stream.eol()){if(stream.peek()==='\\'){stream.next();stream.next();continue}if(stream.peek()==='"'){stream.next();return"string"}stream.next()}return"string"}
      if(stream.match(/#[a-zA-Z_][a-zA-Z0-9_-]*/))return"variable-2"
      if(stream.match(/@[a-zA-Z][a-zA-Z0-9_-]*/))return"link"
      if(stream.match(/<[a-zA-Z][a-zA-Z0-9_-]*>/))return"tag"
      if(stream.match(/\b(if|else|for|while|in|let|set|show|import|include|return|break|continue|not|and|or|as|context)\b/))return"keyword"
      if(stream.match(/\b(true|false|none|auto)\b/))return"atom"
      if(stream.match(/\b\d+(\.\d+)?(pt|em|cm|mm|in|deg|rad|fr|%)?\b/))return"number"
      if(stream.match(/[+\-*/=<>!&|:]+/))return"operator"
      stream.next();return null
    }
  }
});

let currentFile=null,editor=null,previewTimer=null;
const $=id=>document.getElementById(id);

document.addEventListener('DOMContentLoaded',async()=>{
  editor=CodeMirror.fromTextArea($('code'),{
    mode:'typst',theme:'typst-dark',lineNumbers:true,matchBrackets:true,
    autoCloseBrackets:true,styleActiveLine:true,indentUnit:2,tabSize:2,
    indentWithTabs:false,lineWrapping:true,
  });
  editor.setOption('extraKeys',{
    'Ctrl-S':()=>saveAndPreview(),'Ctrl-Enter':()=>saveAndPreview(),
    'Cmd-S':()=>saveAndPreview(),'Cmd-Enter':()=>saveAndPreview(),
  });
  editor.on('cursorActivity',updateCursorPos);
  editor.on('change',onEditorChange);

  $('btnSave').onclick=saveOnly;
  $('btnPreview').onclick=saveAndPreview;
  $('btnExport').onclick=doExport;
  $('btnNew').onclick=showNewModal;
  $('modalCancel').onclick=hideNewModal;
  $('modalOk').onclick=doCreateFile;
  $('newName').addEventListener('keydown',e=>{if(e.key==='Enter')doCreateFile();if(e.key==='Escape')hideNewModal()});
  $('modalBg').addEventListener('click',e=>{if(e.target===$('modalBg'))hideNewModal()});

  await refreshFileList();
});

function onEditorChange(){
  clearTimeout(previewTimer);
  previewTimer=setTimeout(()=>doPreview(),400);
}

// ── File list ──────────────────────────────────────────
async function refreshFileList(select){
  const resp=await fetch('/api/files');
  const files=await resp.json();
  const list=$('fileList');list.innerHTML='';
  files.forEach(f=>{
    const div=document.createElement('div');
    div.className='file-item'+(f.name===currentFile?' active':'');
    div.innerHTML=`<span class="fname">${esc(f.name)}</span><button class="fdel" title="删除">&times;</button>`;
    div.querySelector('.fname').onclick=()=>openFile(f.name);
    div.querySelector('.fdel').onclick=e=>{e.stopPropagation();deleteFile(f.name)};
    list.appendChild(div);
  });
  if(select)await openFile(select);
  else if(files.length&&!currentFile)await openFile(files[0].name);
}

// ── Open ───────────────────────────────────────────────
async function openFile(name){
  const resp=await fetch(`/api/file/${encodeURIComponent(name)}`);
  const data=await resp.json();
  if(data.error){setStatus(data.error,'error');return}
  currentFile=name;
  editor.setValue(data.content);
  editor.clearHistory();
  $('currentName').textContent=name;
  clearError();hidePreview();
  setStatus('已打开 '+name);
  await refreshFileList();
}

// ── Save ───────────────────────────────────────────────
async function saveOnly(){
  if(!currentFile){setStatus('没有打开的文件','error');return}
  setStatus('保存中…');
  const resp=await fetch(`/api/file/${encodeURIComponent(currentFile)}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({content:editor.getValue()}),
  });
  const data=await resp.json();
  if(data.success)setStatus('已保存','success');
  else setStatus(data.error||'保存失败','error');
}

// ── Save + Preview ─────────────────────────────────────
async function saveAndPreview(){
  if(!currentFile){setStatus('没有打开的文件','error');return}
  await saveOnly();
  await doPreview();
}

// ── Preview ────────────────────────────────────────────
async function doPreview(){
  if(!currentFile)return;
  setStatus('渲染中…');
  try{
    const resp=await fetch('/api/preview',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({filename:currentFile}),
    });
    const ct=resp.headers.get('content-type')||'';
    if(ct.includes('application/json')){
      const data=await resp.json();
      if(data.error){showError(data.error);setStatus('渲染失败','error');return}
    }
    if(!resp.ok){showError('渲染失败');setStatus('渲染失败','error');return}
    $('previewContent').innerHTML=await resp.text();
    showPreview();clearError();setStatus('预览已更新');
  }catch(e){showError(e.message);setStatus('渲染失败','error')}
}

// ── Export ─────────────────────────────────────────────
async function doExport(){
  if(!currentFile){setStatus('没有打开的文件','error');return}
  const fmt=$('exportFmt').value;
  const fmtNames={pdf:'PDF',epub:'EPUB',html:'HTML',docx:'DOCX',md:'Markdown',latex:'LaTeX'};
  await fetch(`/api/file/${encodeURIComponent(currentFile)}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({content:editor.getValue()}),
  });
  setStatus(`编译 ${fmtNames[fmt]} 中…`);
  $('btnExport').disabled=true;
  try{
    const resp=await fetch('/api/export',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({filename:currentFile,target:fmt}),
    });
    const data=await resp.json();
    if(data.success){
      const a=document.createElement('a');a.href=data.url;
      a.download=data.filename;a.click();
      setStatus(`${fmtNames[fmt]} 已下载`,'success');
    }else{showError(data.error);setStatus('编译失败','error')}
  }catch(e){showError(e.message);setStatus('编译失败','error')}
  $('btnExport').disabled=false;
}

// ── Create ─────────────────────────────────────────────
function showNewModal(){$('newName').value='';$('modalBg').classList.add('show');setTimeout(()=>$('newName').focus(),50)}
function hideNewModal(){$('modalBg').classList.remove('show')}
async function doCreateFile(){
  let name=$('newName').value.trim();if(!name)return;
  if(!name.endsWith('.typ'))name+='.typ';
  const resp=await fetch('/api/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:name})});
  const data=await resp.json();
  if(data.error){alert(data.error);return}
  hideNewModal();await refreshFileList(data.filename);
}

// ── Delete ─────────────────────────────────────────────
async function deleteFile(name){
  if(!confirm(`确定删除 ${name} ？`))return;
  await fetch(`/api/file/${encodeURIComponent(name)}`,{method:'DELETE'});
  if(currentFile===name){currentFile=null;editor.setValue('');$('currentName').textContent='未打开文件';hidePreview()}
  await refreshFileList();
}

// ── Helpers ────────────────────────────────────────────
function showPreview(){$('previewContent').style.display='block';$('placeholder').style.display='none'}
function hidePreview(){$('previewContent').style.display='none';$('placeholder').style.display='flex';$('previewContent').innerHTML=''}
function showError(msg){$('errorPanel').style.display='block';$('errorText').textContent=msg}
function clearError(){$('errorPanel').style.display='none';$('errorText').textContent=''}
function setStatus(msg,type){const el=$('statusLeft');el.textContent=msg;el.style.color=type==='error'?'var(--error)':type==='success'?'var(--accent)':'var(--text-muted)'}
function updateCursorPos(){const pos=editor.getCursor();$('statusRight').textContent=`行 ${pos.line+1}  列 ${pos.ch+1}  |  ${editor.lineCount()} 行`}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
</body>
</html>
